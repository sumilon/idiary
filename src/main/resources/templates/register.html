<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Create Account – Memoiré</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-deco"></div>
    <div class="auth-card">
        <div class="brand">
            <span class="brand-icon">✦</span>
            <h1 class="brand-name">Memoiré</h1>
            <p class="brand-tagline">Begin your journaling journey</p>
        </div>

        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name"
                       placeholder="Your name"
                       required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       placeholder="you@example.com"
                       required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Min 6 characters"
                       required autocomplete="new-password">
            </div>

            <div id="registerError" class="error-msg hidden"></div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <span class="btn-text">Create Account</span>
            </button>
        </form>

        <p class="auth-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
