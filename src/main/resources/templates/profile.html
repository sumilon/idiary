<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F1B2D">
    <meta name="robots" content="noindex, nofollow">
    <title>Profile – Inkwell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230F1B2D'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23E8A32E'%3EI%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="app-shell">

    <!-- ── Header ── -->
    <header class="app-header">
        <div class="header-row">
            <a href="/dashboard" class="btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Back
            </a>
            <a href="/dashboard" class="h-brand">
                <div class="h-brand-mark">I</div>
                <span class="h-brand-name">Inkwell</span>
            </a>
            <div class="h-right">
                <button class="btn-icon" onclick="logout()" title="Sign out">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- ── Profile body ── -->
    <main class="profile-body">

        <!-- Hero -->
        <div class="profile-hero">
            <div class="profile-avatar" id="profileAvatar">?</div>
            <div class="profile-hero-info">
                <div class="profile-name"  id="profileName">–</div>
                <div class="profile-email" id="profileEmail">–</div>
                <div class="profile-member-badge">
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    Active Member
                </div>
            </div>
        </div>

        <!-- Stats summary -->
        <div class="stats-row" id="profileStats">
            <div class="stat-chip" id="statStreak">🔥 – day streak</div>
            <div class="stat-chip" id="statTotal">📖 – entries</div>
            <div class="stat-chip" id="statTopMood">✨ Top mood: –</div>
        </div>

        <!-- Update profile -->
        <div class="card-section">
            <div class="section-hd">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                Update Profile
            </div>
            <form id="updateProfileForm" class="profile-form" onsubmit="handleUpdateProfile(event)">
                <div class="field">
                    <label for="profileNameInput">Display name</label>
                    <input type="text" id="profileNameInput" placeholder="Your name" required autocomplete="name">
                </div>
                <button type="submit" class="btn btn-primary" id="updateProfileBtn">
                    <span class="btn-text">Save Changes</span>
                </button>
                <div id="profileUpdateError"   class="msg msg-error   hidden" style="margin-top:0.75rem;"></div>
                <div id="profileUpdateSuccess" class="msg msg-success hidden" style="margin-top:0.75rem;"></div>
            </form>
        </div>

        <!-- Change password -->
        <div class="card-section">
            <div class="section-hd">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Change Password
            </div>

            <form id="changePasswordForm" class="profile-form" onsubmit="handleChangePassword(event)">
                <div class="field">
                    <label for="currentPassword">Current password</label>
                    <input type="password" id="currentPassword" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <div class="field">
                    <label for="newPassword">New password</label>
                    <input type="password" id="newPassword" placeholder="Min 8 chars, uppercase, lowercase &amp; digit" required autocomplete="new-password">
                    <small class="field-hint">At least 8 characters with uppercase, lowercase, and a digit.</small>
                </div>
                <div class="field">
                    <label for="confirmPassword">Confirm new password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" id="changePasswordBtn">
                    <span class="btn-text">Update Password</span>
                </button>
                <div id="passwordError"   class="msg msg-error   hidden" style="margin-top:0.75rem;"></div>
                <div id="passwordSuccess" class="msg msg-success hidden" style="margin-top:0.75rem;"></div>
            </form>
        </div>

        <!-- Sign out -->
        <div class="card-section">
            <div class="section-hd danger-hd">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                Account
            </div>
            <p class="danger-note">Signing out will end your current session on this device.</p>
            <button class="btn-signout" onclick="logout()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sign Out
            </button>
        </div>

    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
