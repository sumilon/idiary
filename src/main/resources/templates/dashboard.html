<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F1B2D">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard – Inkwell</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230F1B2D'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23E8A32E'%3EI%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="app-shell">

    <!-- ── Header ── -->
    <header class="app-header">
        <div class="header-row">
            <a href="/dashboard" class="h-brand">
                <div class="h-brand-mark">I</div>
                <span class="h-brand-name">Inkwell</span>
            </a>
            <div class="h-right">
                <span class="h-greeting" id="headerGreeting"></span>
                <a href="/profile" class="btn-icon" title="Profile">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                </a>
                <button class="btn-icon" onclick="logout()" title="Sign out">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- ── Dashboard body ── -->
    <main class="dashboard-body">

        <div class="dash-top">
            <div>
                <h2 class="dash-title" id="dashboardTitle">Good morning</h2>
                <p class="dash-date" id="dashboardDate"></p>
            </div>
            <a href="/entry/new" class="btn-new-entry">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5"  y1="12" x2="19" y2="12"/>
                </svg>
                New Entry
            </a>
        </div>

        <!-- Stats row -->
        <div class="stats-row" id="dashStats" style="display:flex;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap;">
            <div class="stat-chip" id="statStreak">🔥 Loading…</div>
            <div class="stat-chip" id="statTotal">📖 –</div>
            <div class="stat-chip" id="statTopMood">✨ –</div>
        </div>

        <!-- Search + filter + entry count -->
        <div class="search-wrap">
            <div class="search-box">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search entries…" oninput="applyFilters(this.value)">
            </div>
            <select id="moodFilter" class="filter-select" onchange="applyFilters()" title="Filter by mood">
                <option value="">All moods</option>
                <option value="happy">😊 Happy</option>
                <option value="sad">😔 Sad</option>
                <option value="excited">🤩 Excited</option>
                <option value="calm">😌 Calm</option>
                <option value="anxious">😰 Anxious</option>
                <option value="angry">😤 Angry</option>
                <option value="grateful">🙏 Grateful</option>
            </select>
            <span class="entry-count" id="entryCount"></span>
        </div>

        <!-- Entries list injected by JS -->
        <div id="entriesContainer" class="entries-list">
            <div class="state-center">
                <div class="spinner"></div>
                <p>Loading your entries…</p>
            </div>
        </div>

        <!-- Pagination -->
        <div id="paginationBar" class="pagination-bar hidden"></div>

    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
