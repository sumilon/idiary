<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Dashboard – Memoiré</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<div class="app-layout">

    <!-- ── Header ── -->
    <header class="app-header">
        <div class="header-inner">
            <div class="header-brand">
                <span class="brand-icon-sm">✦</span>
                <span class="brand-name-sm">Memoiré</span>
            </div>
            <div class="header-right">
                <span class="header-greeting" id="headerGreeting"></span>
                <button class="btn-icon" onclick="logout()" title="Sign out">
                    <!-- Logout icon -->
                    <svg width="18" height="18" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- ── Main content ── -->
    <main class="dashboard-main">

        <div class="dashboard-top">
            <div class="dashboard-title-block">
                <h2 class="dashboard-title" id="dashboardTitle">Good morning</h2>
                <p class="dashboard-date"  id="dashboardDate"></p>
            </div>
            <a href="/entry/new" class="btn-new">
                <svg width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5"  y1="12" x2="19" y2="12"/>
                </svg>
                New Entry
            </a>
        </div>

        <!-- Entry cards injected here by app.js -->
        <div id="entriesContainer" class="entries-grid">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading your entries…</p>
            </div>
        </div>

    </main>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
