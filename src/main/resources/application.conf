ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        # Minimal thread pools — suitable for a low-traffic Cloud Run instance
        connectionGroupSize = 2
        workerGroupSize     = 2
        callGroupSize       = 2
    }
}

jwt {
    secret             = ${?JWT_SECRET}
    issuer             = "diary-app"
    audience           = "diary-users"
    realm              = "Diary App"
    expirationHours    = 24
    refreshExpirationDays = 30
}

firebase {
    projectId  = ${?FIREBASE_PROJECT_ID}
    databaseId = ${?FIREBASE_DATABASE_ID}
}

grok {
    apiKey  = ${?GROK_API_KEY}
    baseUrl = "https://api.groq.com/openai/v1"
    model   = "llama3-8b-8192"
    model   = ${?GROK_MODEL}
}
