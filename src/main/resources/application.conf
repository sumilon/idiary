ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        connectionGroupSize = 2
        workerGroupSize = 4
        callGroupSize = 4
    }
}

jwt {
    secret = ${?JWT_SECRET}
    issuer = "diary-app"
    audience = "diary-users"
    realm = "Diary App"
    expirationHours = 24
}

firebase {
    projectId = ${?FIREBASE_PROJECT_ID}
    databaseId = ${?FIREBASE_DATABASE_ID}
    credentialsPath = ${?FIREBASE_CREDENTIALS_PATH}
    credentialsJson = ${?FIREBASE_CREDENTIALS_JSON}
}

grok {
    apiKey = ${?GROK_API_KEY}
    baseUrl = "https://api.groq.com/openai/v1"
    model = ${?GROK_MODEL}
}
